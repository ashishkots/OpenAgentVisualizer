version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: oav
      POSTGRES_PASSWORD: oav
      POSTGRES_DB: oav
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oav"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://oav:oav@postgres:5432/oav
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-dev}
      SEED_EMAIL: ${SEED_EMAIL:-kotsai@gmail.com}
      SEED_PASSWORD: ${SEED_PASSWORD:-kots@123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  websocket:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 1
    environment:
      DATABASE_URL: postgresql+asyncpg://oav:oav@postgres:5432/oav
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-dev}
      SEED_EMAIL: ${SEED_EMAIL:-kotsai@gmail.com}
      SEED_PASSWORD: ${SEED_PASSWORD:-kots@123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"

  otlp-gateway:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 4318 --workers 1
    environment:
      DATABASE_URL: postgresql+asyncpg://oav:oav@postgres:5432/oav
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-dev}
      SEED_EMAIL: ${SEED_EMAIL:-kotsai@gmail.com}
      SEED_PASSWORD: ${SEED_PASSWORD:-kots@123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4318:4318"

  celery-worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://oav:oav@postgres:5432/oav
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: deps
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost/api
      VITE_WS_URL: ws://localhost/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./deploy/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
