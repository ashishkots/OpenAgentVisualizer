    - path: "src/sdk/tests/test_sprint2_compatibility.py"
      type: "test"
      summary: >
        60 new test cases across 8 test classes covering: OAVTracer decorator
        (sync + async), LangChain OAVCallbackHandler, CrewAI patch,
        AutoGen patch, OpenAI patch, Anthropic patch, OAVEvent.to_dict()
        serialisation, and OTLPExporter span attribute setting.  All tests
