  artifacts:
    - path: "src/sdk/openagentvisualizer/core/tracer.py"
      type: "code"
      summary: >
        OAVTracer.agent() decorator updated to accept session_id and
        parent_agent_id parameters.  Both are propagated to every emitted
        OAVEvent (started, completed, failed) enabling session-room WebSocket
        routing, event-replay filtering, and delegates_to graph-edge detection.
    - path: "src/sdk/openagentvisualizer/adapters/langchain_adapter.py"
      type: "code"
      summary: >
        OAVCallbackHandler updated with session_id and parent_agent_id
        constructor params.  LangChain run_id is used to generate a stable
        task_id that correlates on_llm_start/on_llm_end pairs.  cost_usd is
        estimated from token counts using a model-prefix lookup table.  Tool
        callbacks also carry task_id and session_id.
    - path: "src/sdk/openagentvisualizer/adapters/crewai_adapter.py"
      type: "code"
      summary: >
        patch_crewai_agent() updated with session_id and parent_agent_id
        params.  Per-invocation task_id generated so start/complete events
        are correlated.  duration_seconds and cost_usd fields added to the
        completed event for analytics aggregates and ACH-003/ACH-004.
    - path: "src/sdk/openagentvisualizer/adapters/autogen_adapter.py"
      type: "code"
      summary: >
        patch_autogen_agent() updated with session_id and parent_agent_id
        params.  task_id generated per invocation.  total_tokens and cost_usd
        extracted from AutoGen reply dict when present (zero for plain string
        replies — callers should also register the LLM adapter).
    - path: "src/sdk/openagentvisualizer/adapters/openai_adapter.py"
      type: "code"
      summary: >
        patch_openai_client() updated with session_id and parent_agent_id
        params.  task_id generated per call.  cost_usd estimated via
