  critical_fixes_applied:
    - id: "CR-001"
      file: "src/frontend/src/pages/World3DPage.tsx"
      description: >
        Boolean logic bug: changed `!isFallback || UE5_ENABLED` to
        `!isFallback && UE5_ENABLED` so PixelStreamViewer does not render
        after fallback is triggered. Required by ADR-006 fallback-first.

    - id: "CR-002"
      file: "src/frontend/src/pages/MeshTopologyPage.tsx"
      description: >
        Added missing `MeshNode` and `MeshEdge` type imports. Without this
        fix, TypeScript strict compilation would fail.

    - id: "CR-003"
      file: "src/frontend/src/pages/TraceExplorerPage.tsx"
      description: >
        Changed bare `<>` fragment to `<Fragment key={trace.trace_id}>` in
        the trace list .map() to provide React with proper list keys and
        prevent reconciliation issues.

    - id: "CR-004"
      files:
        - "src/backend/app/services/openmind_service.py"
        - "src/backend/app/services/opentrace_service.py"
      description: >
        Added proper URL encoding for user-provided search query parameters.
        Used urllib.parse.quote for OpenMind search and urllib.parse.urlencode
        for OpenTrace search. Prevents URL injection via special characters.

    - id: "CR-005"
      file: "src/backend/app/routers/ue5_websocket.py"
      description: >
        Fixed broadcast_agent_spawned to track and clean up dead WebSocket
        connections instead of silently swallowing exceptions. Consistent
        with the pattern used in broadcast_agent_state_changed.

  important_issues_for_qa:
    - id: "CR-008"
      description: >
        TraceWaterfallView schema expects total_duration_ms and trace_start
        fields, but get_trace_waterfall delegates to get_trace_detail which
        returns different field names. This will cause Pydantic validation
        errors if the upstream API returns the detail format. QA should test
        the waterfall endpoint end-to-end.

    - id: "CR-010"
      description: >
        AgentDetailPage does not yet include the AgentTracesTab component.
        The component exists at src/frontend/src/components/agents/AgentTracesTab.tsx
        but needs to be wired into the AgentDetailPage. The Frontend Expert
        deferred this to avoid merge conflicts.

    - id: "CR-012"
      description: >
        OpenTrace service cache key opentrace:agent:{agent_id}:traces does
        not include workspace_id, unlike other integration service cache
        keys. Could serve cross-workspace stale data in multi-tenant setups.

