      type: "code"
      summary: "Added GET /api/metrics/aggregates?interval=hourly|daily&period=24h|7d|30d|90d endpoint. Queries TimescaleDB continuous aggregate views (metrics_hourly, metrics_daily). Gracefully falls back to empty result with note when views unavailable (e.g. non-TimescaleDB env)."
