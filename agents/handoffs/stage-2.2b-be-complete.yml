    - path: "src/backend/app/routers/agents.py"
      type: "code"
      summary: "Added GET /api/agents/graph endpoint. Serves cached graph from Redis in <200ms; returns HTTP 202 on cache miss and enqueues Celery task. Route ordering: /graph defined before /{agent_id}/stats to avoid path shadowing."
