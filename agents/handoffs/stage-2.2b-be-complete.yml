      type: "code"
      summary: "Upgraded from 5-level to 10-level XP system. LEVEL_THRESHOLDS now has 10 entries [0,500,1500,3500,7000,12000,20000,35000,60000,100000]. Added xp_for_trigger(), level_name(), xp_to_next_level(). XP_AWARDS dict maps trigger names to PRD-specified amounts. Backward-compatible: compute_xp_award() and process_xp_gain() preserved."
    - path: "src/backend/app/tasks/achievements.py"
      type: "code"
      summary: "Celery task evaluate_achievements(workspace_id, agent_id) evaluates all 10 achievement conditions, awards earned achievements atomically, handles race conditions via IntegrityError retry, and publishes WebSocket events via Redis Pub/Sub. Includes refresh_leaderboard() task for materialized view refresh."
    - path: "src/backend/app/tasks/graph.py"
      type: "code"
      summary: "Celery task compute_agent_graph(workspace_id) builds the agent relationship graph from event history (shared_session, delegates_to, monitors edges), serializes to JSON, and caches in Redis with 5-minute TTL. Retries on failure (max 3)."
    - path: "src/backend/app/routers/gamification.py"
