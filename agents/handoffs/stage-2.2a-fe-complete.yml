  notes: >
    Key frontend decisions made during this stage:
    (1) PixiJS GSAP tint tweens use `pixi: { tint }` syntax which requires GSAPPixiPlugin
    registration. For Sprint 2 the tween will silently no-op if not registered; the ring
    color change still happens via `drawLevelRing()` on the next `update()` call. The
    Code Reviewer should note this and decide if GSAPPlugin registration belongs in main.tsx.
    (2) The `agentMachine` XState v5 `setup()` API now requires `input` type declaration and
    `({ input }) =>` context factory — aligned with XState 5.13 API. The old `working/thinking/
    communicating` states are gone; existing backend events mapped via `wsEventToFsmEvent()`.
    (3) ReactFlow topology page fetches `/api/agents/graph` endpoint which is a new Sprint 2
    backend endpoint. Falls back gracefully to store agents with no edges if endpoint is absent.
    (4) `lucide-react` was not in the original package.json — added at ^0.400.0. User must run
    `npm install` before starting dev server.
    (5) `AgentDetailPanel` (old slide-in panel) is kept in-place for backward compat — the new
    full-page `AgentDetailPage` is the Sprint 2 primary destination.
    (6) `ReplayPage` now redirects to `/sessions` to maintain old /replay route compatibility.
    (7) All toast animations use GSAP `from()` not `fromTo()` to avoid needing explicit initial
    state in DOM, which matches the design system Section 5 spec exactly.
    (8) The `animateSafe()` wrapper checks `prefers-reduced-motion` at call time (not cached)
    so it respects OS setting changes without page reload.

