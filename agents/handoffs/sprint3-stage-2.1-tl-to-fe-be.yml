  notes: "Key implementation decisions for Backend Expert: (1) Circuit breaker state is in-memory per process, not Redis -- this avoids latency but means each worker has independent circuit state. Acceptable for the current single-backend-process deployment. (2) Integration API keys are encrypted with Fernet derived from SECRET_KEY -- if SECRET_KEY changes, all stored keys become unreadable; document this in deployment notes. (3) The /ws/live endpoint needs a small modification to accept X-API-Key query param as alternative to JWT token for CLI WebSocket streaming. (4) Add 'cryptography' and 'httpx' to requirements.txt. (5) The CLI is a separate package in src/cli/ with its own pyproject.toml -- it does not share the backend virtualenv. Key implementation decisions for Frontend Expert: (1) New pages are lazy-loaded via React.lazy, consistent with existing AppShell pattern. (2) TanStack Query hooks for integration APIs should use staleTime matching the backend Redis cache TTL to avoid redundant refetches. (3) The PixelStreamViewer component uses Epic's official npm library; if that library is unavailable or unstable, fall back to raw WebRTC via RTCPeerConnection directly. (4) TraceWaterfall is implemented with plain divs and Tailwind (no additional charting library). (5) Add data-testid attributes to all interactive elements early -- the E2E page objects depend on them. (6) Generate package-lock.json for CI cache efficiency (currently absent per known fix notes). (7) Import new lucide-react icons: Box, Activity, GitBranch, Brain, Shield for nav items."
