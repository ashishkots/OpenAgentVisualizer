  implementation_notes:
    - "cryptography package provides Fernet. KEY NOTE: If SECRET_KEY changes, all stored integration API keys become unreadable (InvalidToken). Document in deployment runbook: rotate integration keys after rotating SECRET_KEY."
    - "Circuit breaker state is in-memory per process (ADR-007). Each worker process maintains independent circuit state. Acceptable for current single-backend deployment; may need Redis-backed state for multi-process production."
    - "oav_websocket_connections_active gauge tracks only /ws/live connections via RoomWebSocketManager. /ws/ue5 connections are tracked separately but not yet in Prometheus (by design — UE5 is optional)."
    - "CLI stream_events async generator connects to /ws/live with api_key query param. The backend now accepts both token= (JWT) and api_key= (API key) query params on /ws/live."
    - "apply_xp_decay Celery task is scheduled every 24h (86400s). For exact midnight-UTC execution in production, replace with crontab(hour=0, minute=0) — requires celery[redis] with beat crontab support."
    - "Integration service singletons (opentrace_service etc.) are module-level. Their circuit breaker state persists for the lifetime of the process. In tests that need isolation, use new service instances."
    - "The /ws/ue5 endpoint is registered on the main app. UE5 authentication uses the existing APIKey model with bcrypt hash verification (same as X-API-Key header auth, max 50 key scan)."

  blockers: []
  dependencies_met: true

  for_code_reviewer:
    critical_paths:
      - "app/core/integrations.py — CircuitBreaker correctness, Fernet key derivation safety"
      - "app/routers/integrations/config.py — upsert logic (unique constraint handling), API key never leaked in response"
      - "app/routers/websocket.py — api_key auth path for CLI, no regression on existing JWT path"
      - "app/routers/ue5_websocket.py — authentication guards, relay direction logic"
    security_review_items:
      - "Fernet key derivation uses SHA-256 of SECRET_KEY — verify this is adequate or should use PBKDF2"
      - "APIKey scan is capped at 50 keys to prevent DoS — verify this cap is enforced in new /ws/ue5 and /ws/live api_key paths"
      - "Integration base_url validator accepts http:// (not only https://) — intentional for local dev; confirm this is acceptable"
    test_coverage_gaps:
      - "Integration router 503 paths not tested via API (only service layer tested) — acceptable for Sprint 3, add in QA phase"
      - "UE5 WebSocket relay logic not tested end-to-end (requires two simultaneous WS connections) — CLI/E2E test recommended"
