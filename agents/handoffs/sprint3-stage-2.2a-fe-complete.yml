      summary: "IntegrationConfig, IntegrationType, IntegrationStatus, ConnectionTestResult types."

    - path: "src/frontend/src/types/trace.ts"
      type: "types"
      summary: "Trace, Span, SpanStatus, TraceSearchParams, TraceListResponse, WaterfallData types."

    - path: "src/frontend/src/types/mesh.ts"
