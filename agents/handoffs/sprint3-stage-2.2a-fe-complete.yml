      summary: "UE5ConnectionState, CameraMode, PixelStreamConfig, UE5Message, UE5StreamStats types."

    - path: "src/frontend/src/stores/integrationStore.ts"
      type: "store"
      summary: >
        Zustand store for integration configs. CRUD for all 4 products, connection
        test results, testing state. getStatus() derived selector handles enabled/null
        logic.

    - path: "src/frontend/src/stores/traceStore.ts"
      type: "store"
      summary: >
        Zustand store for traces. Holds traces list, selected trace/span, expanded
        trace IDs (for waterfall), search params.

    - path: "src/frontend/src/stores/meshStore.ts"
      type: "store"
      summary: >
        Zustand store for mesh topology. Holds topology, selected node, live update
        sets for node/edge pulse animations, period selector state.

    - path: "src/frontend/src/stores/knowledgeStore.ts"
      type: "store"
      summary: >
        Zustand store for knowledge graph. Holds graph, selected entity, search
        query/results, filter type, display pagination count.

    - path: "src/frontend/src/stores/securityStore.ts"
      type: "store"
      summary: >
        Zustand store for security dashboard. Holds compliance score, agent profiles,
        violations, timeline, selected agent.

    - path: "src/frontend/src/hooks/useIntegrations.ts"
      type: "hooks"
      summary: "useIntegrations (poll 60s), useIntegrationTest (mutation), useSaveIntegration (mutation)."

    - path: "src/frontend/src/hooks/useTraces.ts"
      type: "hooks"
      summary: "useTraces, useTrace, useTraceWaterfall, useAgentTraces — all TanStack Query."

    - path: "src/frontend/src/hooks/useMesh.ts"
      type: "hooks"
      summary: "useMeshTopology (poll 30s), useMeshNode."

    - path: "src/frontend/src/hooks/useKnowledge.ts"
      type: "hooks"
      summary: "useKnowledgeGraph, useKnowledgeEntity, useKnowledgeSearch."

    - path: "src/frontend/src/hooks/useSecurity.ts"
      type: "hooks"
      summary: "useSecurityScores, useSecurityViolations, useSecurityGrades, useViolationTimeline, useAgentSecurityProfile."

    - path: "src/frontend/src/hooks/useDebounce.ts"
      type: "hooks"
      summary: "Generic debounce hook, 300ms default. Used by knowledge search."

    - path: "src/frontend/src/components/ui/SlideInPanel.tsx"
      type: "component"
      summary: >
        Unified 300ms translateX slide-in panel. Props: open, onClose, title,
        width (320|360), children. Handles Escape key, backdrop click, GSAP animation
        with prefers-reduced-motion fallback. Used by all 4 detail panels.

    - path: "src/frontend/src/components/ui/GradeBadge.tsx"
      type: "component"
      summary: >
        Circular grade badge (A-F). 3 sizes: sm/md/lg. GSAP scale pop animation
        on grade change (with animate prop). Grade-to-color mapping from UI spec.

    - path: "src/frontend/src/components/ui/IntegrationStatusBadge.tsx"
      type: "component"
      summary: >
        Inline status badge: connected/degraded/disconnected/not_configured.
        StatusDot + label + optional lastCheck time. Degraded uses animate-pulse.

    - path: "src/frontend/src/components/ui/FallbackBanner.tsx"
      type: "component"
      summary: >
        Two variants: 'warning' (oav-warning/10 bg, AlertTriangle icon) for integration
        unavailability, '3d' (oav-3d/10 bg, Info icon) for UE5 fallback.
        Dismissible with GSAP slide-up animation. Stores dismissal in sessionStorage.

    - path: "src/frontend/src/components/ui/GaugeChart.tsx"
      type: "component"
      summary: >
        SVG semicircular gauge for compliance score. viewBox 200x120, arc path with
        stroke-dasharray=251.3. GSAP animates dashoffset on score change. scoreToGrade
        helper exported. Grade scale legend below arc.

    - path: "src/frontend/src/components/world3d/PixelStreamViewer.tsx"
      type: "component"
      summary: >
        Full WebRTC Pixel Streaming component. States: idle/connecting/connected/
        reconnecting/fallback. 3s connection timeout → fallback. Processes UE5 messages
        (agent_selected, world_stats, ping/pong). Shows loading progress overlay,
        reconnecting overlay with retry countdown, status bar (FPS/ping/agents/camera).

    - path: "src/frontend/src/components/traces/TraceWaterfall.tsx"
      type: "component"
      summary: >
        Waterfall visualization. Builds span tree from flat list. Bar positioning:
        left% = start_time/duration*100, width% = span_duration/duration*100, min 3px.
        6 bar color conditions per spec. GSAP expand animation on mount.

    - path: "src/frontend/src/components/mesh/MeshTopologyNode.tsx"
      type: "component"
      summary: >
        ReactFlow custom node for Mesh page. Shows agent avatar, name, level, mesh role
        badge (Producer/Consumer/Router with distinct colors). GSAP ring pulse on live
        update. Selected/disconnected states.

    - path: "src/frontend/src/components/knowledge/KnowledgeGraphNode.tsx"
      type: "component"
      summary: >
        ReactFlow custom node for Knowledge page. 4 entity type shapes: circle (concept),
        rounded-rect (fact), diamond (agent_memory via CSS rotate-45), hexagon (embedding
        via clip-path + box-shadow border). GSAP opacity/scale on search match/no-match.

    - path: "src/frontend/src/components/settings/IntegrationConfigCard.tsx"
      type: "component"
      summary: >
        Per-product integration config card. URL + API key inputs with eye toggle.
        Enable/disable toggle switch. Test Connection button (4 states: idle/testing/
        success/failure). Save button (disabled until dirty). All data-testid attributes.

    - path: "src/frontend/src/components/agents/AgentTracesTab.tsx"
      type: "component"
      summary: >
        Traces tab for AgentDetailPage. Shows last 20 agent traces from OpenTrace.
        Falls back to config prompt if OpenTrace not configured. Click row → /traces.

    - path: "src/frontend/src/pages/World3DPage.tsx"
      type: "page"
      summary: >
        OAV-301. Desktop-only guard (redirects mobile to /world). PixelStreamViewer
        integration. Controls guide overlay (first visit, localStorage). 2D/3D toggle.
        FallbackBanner for UE5 unavailability. Agent sidebar slide-in panel.

    - path: "src/frontend/src/pages/TraceExplorerPage.tsx"
      type: "page"
      summary: >
        OAV-302. Search bar with time range/duration/errors-only filters. Integration
        status bar. Trace list table with expand/collapse waterfall. Span detail
        slide-in panel with attributes and OpenTrace link. Pagination.

    - path: "src/frontend/src/pages/MeshTopologyPage.tsx"
      type: "page"
      summary: >
        OAV-303. ReactFlow graph with MeshTopologyNode. Stats overlay (agents/connections/
        msg/latency). Period selector (1h/24h/7d). Node detail slide-in panel.
        FallbackBanner when OpenMesh unreachable.

    - path: "src/frontend/src/pages/KnowledgeGraphPage.tsx"
      type: "page"
      summary: >
        OAV-304. ReactFlow with KnowledgeGraphNode. Search with 300ms debounce.
        Entity type filter. Load more pagination. Entity detail slide-in panel with
        related entities. Empty state when OpenMind unreachable.

    - path: "src/frontend/src/pages/SecurityPage.tsx"
      type: "page"
      summary: >
        OAV-305. Summary stats row, GaugeChart compliance gauge, agent security table
