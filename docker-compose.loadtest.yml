services:
  locust-master:
    image: locustio/locust:2.24.1
    ports:
      - "8089:8089"
    volumes:
      - ./tests/load:/mnt/locust
    command: >
      -f /mnt/locust/locustfile.py
      --master
      --host=http://nginx:80
    networks:
      - default
    depends_on:
      - nginx

  locust-worker:
    image: locustio/locust:2.24.1
    volumes:
      - ./tests/load:/mnt/locust
    command: >
      -f /mnt/locust/locustfile.py
      --worker
      --master-host=locust-master
    networks:
      - default
    deploy:
      replicas: 4

networks:
  default:
    name: openagentvisualizer_default
    external: true
