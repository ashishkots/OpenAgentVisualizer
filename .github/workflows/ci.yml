name: CI

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: oav
          POSTGRES_PASSWORD: oav
          POSTGRES_DB: oav_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r src/backend/requirements.txt
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://oav:oav@localhost:5432/oav_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret
        run: cd src/backend && pytest --cov=app tests/ -v

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: cd src/frontend && npm install
      - name: Run frontend tests
        run: cd src/frontend && npm test
      - name: Build frontend
        run: cd src/frontend && npm run build

  sdk-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SDK
        run: pip install -e "src/sdk[dev]"
      - name: Run SDK tests
        run: cd src/sdk && pytest --cov=openagentvisualizer tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, sdk-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build all Docker images
        run: docker compose build --no-cache
      - name: Smoke test docker-compose up
        run: |
          cp .env.example .env
          docker compose up -d
          sleep 15
          curl -f http://localhost/api/health || exit 1
          docker compose down
