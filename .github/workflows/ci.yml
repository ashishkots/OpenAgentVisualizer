name: CI

# workflow_dispatch ONLY — no automatic triggers on push or PR (per CI/CD policy)
on:
  workflow_dispatch:

jobs:
  # ---- Backend jobs (all parallel, no inter-dependencies) ----

  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: src/backend/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/backend/

  backend-typecheck:
    name: Backend Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r src/backend/requirements.txt mypy types-passlib

      - name: Run mypy
        run: mypy src/backend/app/ --ignore-missing-imports --no-strict-optional

  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: oav
          POSTGRES_PASSWORD: oav
          POSTGRES_DB: oav_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U oav"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r src/backend/requirements.txt

      - name: Run pytest with coverage
        working-directory: src/backend
        run: pytest --cov=app --cov-report=xml --cov-report=html -v
        env:
          DATABASE_URL: postgresql+asyncpg://oav:oav@localhost:5432/oav_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          SEED_EMAIL: ci@example.com
          SEED_PASSWORD: ci-password-123

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/backend/htmlcov/

  # ---- Frontend jobs (all parallel, no inter-dependencies) ----

  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm install

      - name: Run ESLint
        working-directory: src/frontend
        run: npx eslint src/

  frontend-typecheck:
    name: Frontend Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm install

      - name: Run TypeScript compiler check
        working-directory: src/frontend
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm install

      - name: Run Vitest with coverage
        working-directory: src/frontend
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/frontend/coverage/

  # ---- Docker build (waits for both test jobs) ----

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-test
    steps:
      - uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build

  # ---- E2E tests (waits for Docker build) ----

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs:
      - docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health && echo " OK" && break
            echo "Waiting for backend... ($i/30)"
            sleep 3
          done

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Stop services
        if: always()
        run: docker compose down
