# Rate limiting zones
# api: 100 requests per minute per IP (burst 20)
# auth: 5 requests per minute per IP (burst 3) — strict for login/register
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

upstream backend {
    server backend:8000;
}

upstream websocket {
    server websocket:8001;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS in production
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # SSL certificates (mounted as secrets in production)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"  always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; worker-src blob:;" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    # -----------------------------------------------------------------------
    # Gzip compression
    # -----------------------------------------------------------------------
    gzip              on;
    gzip_min_length   256;
    gzip_comp_level   5;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types
        application/json
        text/html
        text/css
        application/javascript
        text/javascript
        application/x-javascript
        image/svg+xml
        application/font-woff
        application/font-woff2;

    # -----------------------------------------------------------------------
    # General settings
    # -----------------------------------------------------------------------
    client_max_body_size 10m;
    keepalive_timeout    65;
    server_tokens        off;

    # -----------------------------------------------------------------------
    # Auth endpoints — strict rate limit (5r/m, burst 3, no delay)
    # -----------------------------------------------------------------------
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Prometheus metrics — no rate limit (scraped by internal Prometheus)
    # -----------------------------------------------------------------------
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # -----------------------------------------------------------------------
    # OTLP HTTP ingest
    # -----------------------------------------------------------------------
    location /otlp/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # REST API — standard rate limit (100r/m, burst 20)
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # -----------------------------------------------------------------------
    # WebSocket — long-lived connections, no per-request rate limit
    # -----------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;
    }

    # -----------------------------------------------------------------------
    # Static assets — 1 year immutable cache
    # -----------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # -----------------------------------------------------------------------
    # Frontend SPA catch-all
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
