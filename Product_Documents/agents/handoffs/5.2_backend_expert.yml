  - "Default user seed: kotsai@gmail.com / kots@123 (per CLAUDE.md)"
  - "XP worked examples verified against Gamification System Design spec (67 XP and 809 XP)"
  - "OAuth2 flows use PKCE with Redis-backed CSRF state validation"
  - "WebSocket authentication via JWT query parameter (token=)"
  - "Persist writer designed as standalone asyncio process, not a Celery task, for lowest latency"
