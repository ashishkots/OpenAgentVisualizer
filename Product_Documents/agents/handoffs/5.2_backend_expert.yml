key_decisions:
  - decision: "Repository pattern for all database access"
    rationale: "Separates query logic from service layer, enables easier testing with mock repositories"

  - decision: "Redis Streams for event bus instead of Kafka"
    rationale: "Per architecture doc — lower latency, simpler ops, built-in consumer groups, sufficient for initial scale"

  - decision: "Celery with Redis broker for background tasks"
    rationale: "Mature Python task queue, supports periodic beat scheduling for gamification jobs"

  - decision: "Composite primary keys on hypertables (id + time column)"
    rationale: "TimescaleDB requires the time-partition column in the primary key for hypertable creation"

  - decision: "bcrypt==4.0.1 pinned"
    rationale: "passlib 1.7.4 incompatible with bcrypt >= 5.0.0 — per CLAUDE.md known fixes"

  - decision: "Sliding window rate limiter via Redis sorted sets"
    rationale: "More accurate than fixed window, handles burst traffic gracefully"

  - decision: "PII detection runs in the hot ingestion path"
    rationale: "Must mask sensitive data before it reaches Redis Streams or TimescaleDB — cannot rely on post-hoc cleanup"

  - decision: "Separate persist_writer process (not Celery task)"
    rationale: "Continuous stream consumer needs to run indefinitely with low latency — Celery's task model adds unnecessary overhead"

models_implemented:
  standard_tables:
    - "User (users)"
    - "Workspace (workspaces)"
    - "WorkspaceMember (workspace_members)"
    - "Agent (agents)"
    - "AgentSession (agent_sessions)"
    - "AgentState (agent_states)"
    - "Task (tasks)"
    - "TaskAssignment (task_assignments)"
    - "TaskResult (task_results)"
    - "Achievement (achievements)"
    - "UserAchievement (user_achievements)"
    - "XPLedger (xp_ledger)"
    - "LeaderboardSnapshot (leaderboard_snapshots)"
    - "AlertRule (alert_rules)"
    - "Alert (alerts)"
    - "Notification (notifications)"
    - "APIKey (api_keys)"
  hypertables:
    - "Event (events) — daily chunks, 7-day compression, 90-day retention"
    - "Span (spans) — daily chunks, 7-day compression, 90-day retention"
    - "MetricsRaw (metrics_raw) — hourly chunks, 1-day compression, 7-day retention"
    - "AuditLog (audit_log) — weekly chunks, 30-day compression, 1-year retention"
  continuous_aggregates:
    - "metrics_1min"
    - "metrics_1hour"
    - "metrics_1day"
    - "agent_daily_summary"

api_endpoints_count: 40+
routers:
  - "auth — register, login, refresh, oauth/{provider}, oauth/{provider}/callback"
  - "users — GET/PUT profile, preferences"
  - "workspaces — CRUD, members, settings"
  - "agents — CRUD, heartbeat, state change"
  - "tasks — CRUD, assignment, result submission"
  - "traces — bulk ingest, query, session replay"
  - "metrics — query aggregated, SSE stream"
  - "achievements — list all, agent achievements"
  - "leaderboard — rankings by time window"
  - "quests — daily/weekly/epic quests"
  - "alerts — rules CRUD, alert history, acknowledge"
  - "notifications — list, mark read"
  - "api-keys — CRUD"
  - "dashboard — workspace overview aggregates"
  - "otlp_receiver — POST /v1/traces (OTLP HTTP)"
  - "websocket — WS /ws/{workspace_id}"
  - "health — GET /health, /ready"

test_coverage_targets:
  unit_tests: "XP calculation, quality multipliers, level computation, streak bonuses, tier names"
  api_tests: "All CRUD endpoints, auth flow, error cases, rate limiting"
  websocket_tests: "Connection, authentication, subscribe/unsubscribe"
  integration_tests: "Full agent lifecycle, bulk event ingestion"

blockers: []

notes:
