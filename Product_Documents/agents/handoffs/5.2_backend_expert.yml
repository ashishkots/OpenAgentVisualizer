  - stage: "1.3"
    role: "Agentic AI Architect"
    artifact: "Agent_Integration_Architecture.md"
    used_for: "OTLP receiver design, event schema, SDK integration patterns, framework adapters"

  - stage: "1.2"
    role: "Gamification Expert"
    artifact: "Gamification_System_Design.md"
    used_for: "XP formulas, achievement criteria, leaderboard scoring algorithm, quest templates"

  - stage: "1.1"
    role: "Product Manager"
