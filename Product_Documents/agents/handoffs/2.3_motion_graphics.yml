handoff:
  id: "oav-2.3-motion-graphics"
  from_stage: "2.3"
  from_agent: "Motion Graphics Agent"
  to_stage: "2.2a"
  to_agent: "Frontend Expert"
  product: "OpenAgentVisualizer"
  date: "2026-03-16"
  status: "complete"

artifact:
  type: "animation_specification"
  path: "Product_Documents/05_Motion_Graphics/Animation_Spec.md"
  format: "markdown"
  word_count: 9800
  sections: 11
  appendices: 2

summary: >
  Comprehensive animation specification for OpenAgentVisualizer covering all motion design
  across three rendering layers: Rive state machines for agent character animations on the
  PixiJS canvas, GSAP-driven UI micro-animations in the React DOM layer, and a custom
  PixiJS particle system for data flow visualization, celebrations, and error effects.
  The spec defines 11 agent animation states with full blend trees, 10 categories of UI
  micro-animations, 5 particle system types with a hard budget of 500 particles and LOD
  culling, GSAP transition specifications for all page and view mode switches, Tone.js
  sound design integration, and a complete token system for durations, easings, colors,
  scales, particles, and z-indices.

deliverables:
  - name: "Animation Philosophy"
    description: "Three laws of OAV motion: motion encodes state, motion respects attention, motion degrades gracefully. Professional Mode behavior defined."
    status: "complete"

  - name: "Rive State Machine Specifications"
    description: "Full agent lifecycle state machine with 12 states, all transitions and triggers mapped to SDK event types, blend trees for idle/working/error with continuous input parameters (speed, intensity, energy, mood, tier, severity), file organization for 6 tier .riv files plus effects and shared assets, file size budget of 250KB total."
    status: "complete"

  - name: "Agent Character Animations"
    description: "10 animation states fully specified: idle (6 variants with random timers), working (3 variants selected by tool type with progress ring), thinking (3 simultaneous variants with pulsing glow), communicating (speech bubble, turn-toward, data beam), error (4 variants with severity blend), overloaded (sweat drops, frantic motion, task stack), sleeping (ZZZ bubbles, slump, deep breathing), celebrating (confetti, fist pump, sparkles with rarity scaling), leveling up (3000ms sequence with glow, size pulse, particle burst, badge appear, tier swap), terminated (1500ms fade with ghost trail). Each state has duration, easing, loop behavior, and per-tier differences documented."
    status: "complete"

  - name: "UI Micro-Animations"
    description: "10 categories: page transitions (forward/back/tab/first-load), panel open/close (sidebar/detail/bottom with content stagger), button states (hover/press/loading/success/error), toggle/switch, tooltip appear/disappear, modal entrance/exit, tab switching with direction awareness, list item enter/exit with stagger cap at 15 items, skeleton loading shimmer, progress bar fill (determinate/indeterminate/success/error)."
    status: "complete"

  - name: "Data Visualization Animations"
    description: "Chart data entry for line/bar/scatter charts, real-time chart updates with smooth interpolation and batched rendering, metric counter roll-up with proportional duration, sparkline draw animation with live update, pie/donut chart segment transitions with hover expand."
    status: "complete"

  - name: "Notification Animations"
    description: "Achievement unlock (2000ms sequence with badge fly-in, particle burst, rarity-scaled intensity, legendary full-screen override), level up (3000ms full-screen with golden flash, number increment, title type-in, fanfare particles, tier boundary handling), alert (slide-in with border pulse and stack behavior), error (red shake with persistent dismiss), success (checkmark draw-on with mini confetti)."
    status: "complete"

  - name: "Particle Systems"
    description: "5 particle types: data flow (color-coded by message type, bezier path, bidirectional support), token consumption (budget-proportional emission, color shift as budget depletes), cost accumulation (coin particles arcing to cost meter), celebration (confetti with physics, sparkles, stars), error (red sparks, smoke for severe errors). Global budget of 500 particles with 4 LOD tiers and priority-based culling. Object pooling with zero runtime allocation."
    status: "complete"

  - name: "Transition Specifications (GSAP)"
    description: "Page-to-page transitions, view mode switches (world/dashboard/trace with mini-map and blur effects), layout shifts (sidebar collapse, panel resize with snap), 8 named easing curves with GSAP and CSS equivalents, custom spring curve for avatar movement."
    status: "complete"

  - name: "Performance Guidelines"
    description: "16.6ms frame budget breakdown across 5 subsystems, GPU vs CPU decision matrix, will-change management rules, reduced motion mode with 4-level user override, mobile performance tiers (detected via startup benchmark), distance-based LOD with 4 tiers and zoom-based fallback."
    status: "complete"

  - name: "Sound Design Integration"
    description: "Tone.js synthesized audio for 12 event types, muted by default with opt-in, 4 volume categories with independent sliders, spatial audio panning based on agent canvas position, 8-voice polyphony limit with priority-based voice stealing, 100ms debounce, lazy-loaded 45KB bundle."
    status: "complete"

  - name: "Animation Tokens"
    description: "Complete token system: 8 duration tokens (0ms-3000ms), 9 easing tokens with GSAP and CSS values, 25 color tokens (state colors, tier colors, rarity colors), 10 scale tokens, 12 particle tokens, 7 z-index layer tokens."
    status: "complete"

