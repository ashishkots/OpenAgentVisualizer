risks:
  - risk: "Rive WASM renderer may have memory leaks with 50+ simultaneous instances"
    mitigation: "LOD system pauses off-screen instances; monitor heap in QA; fallback to CSS-only at LOD 2+"
    severity: "medium"

  - risk: "GSAP license requires GreenSock Club membership for commercial use of some plugins"
    mitigation: "Core GSAP is free; CustomEase requires paid license. Budget $200/yr or implement custom cubic-bezier fallback"
    severity: "low"

  - risk: "Tone.js AudioContext may be blocked by browser autoplay policies"
    mitigation: "Audio is muted by default; user must click enable. AudioContext created on first user gesture per Web Audio API spec"
    severity: "low"

  - risk: "Particle system object pooling may cause GC pressure if pool size is insufficient"
    mitigation: "Pool pre-allocates 500 objects at startup; force-kill lowest-priority particles when exhausted; monitor GC pauses in performance tests"
    severity: "medium"
