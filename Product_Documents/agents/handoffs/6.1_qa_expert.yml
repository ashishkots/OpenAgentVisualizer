summary: |
  QA Test Strategy complete with 11 sections covering the full testing pyramid
  for OpenAgentVisualizer. Key deliverables:

  - Test pyramid: 75% unit (~1500 cases), 20% integration (~200 cases), 5% E2E (~30 flows)
  - Backend unit tests: 18 XP calculation tests, 10 achievement trigger tests,
    10 leaderboard tests, 13 auth tests, 12 agent service tests, 10 task tests,
    7 event tests, 10 alert tests, 5 PII detector tests
  - Frontend unit tests: 12 XState agent machine transitions, 12 Zustand store tests,
    9 hook tests, 13 component tests, 5 XP calculator utility tests
  - Integration tests: 50+ API endpoint tests across all routers with expected
    status codes and response schemas, 17 database tests, 15 WebSocket tests,
    5 SSE tests, 10 Redis tests
  - E2E flows: 8 critical user journeys (onboarding, agent registration, task lifecycle,
    dashboard, achievement unlock, alert trigger, session replay, leaderboard)
  - Performance targets: 60fps with 50 agents, 100K events/sec ingestion,
    50K WebSocket connections, <500ms event-to-render latency, <500KB initial bundle
  - Security: RBAC matrix for all 4 roles, OWASP Top 10 checklist,
    rate limiting verification, PII detection tests
  - Accessibility: WCAG 2.2 AA checklist, 9 keyboard nav tests,
    8 screen reader tests, color contrast verification, reduced motion tests
  - Gamification: 38 achievement trigger tests, 10 XP formula accuracy tests,
    12 leaderboard correctness tests, 6 quest tests, 6 economy balance tests,
    8 professional mode toggle tests
  - CI/CD: Pre-commit hooks, PR checks, Docker build verification,
    health checks, 10-step smoke test suite
  - Test data: Factory patterns for all models, seed data strategy,
    environment parity, transaction-rollback cleanup

