summary:
  description: >
    Complete UI design system for OpenAgentVisualizer defining the visual language for a gamified
    AI agent observability platform. The system is dark-mode-first, built on CSS custom properties
    consumed via Tailwind CSS, with 43 fully specified components across 7 categories (layout,
    navigation, data display, inputs, feedback, gamification, charts). Includes 9 detailed screen
    designs covering the virtual world canvas, dashboard, agent detail, sessions, leaderboard,
    settings, alerts, costs, and login/onboarding flows. Supports dual-mode rendering (Gamified
    and Professional) through token overrides without layout changes. Meets WCAG 2.2 AA accessibility
    standards with documented contrast ratios, focus ring specs, reduced motion fallbacks, and
    screen reader ARIA patterns.

  key_decisions:
    - "Dark mode (#0F1117 base) as primary theme -- optimized for monitoring sessions and reduced eye strain"
    - "Inter + JetBrains Mono font pairing -- clean UI text with developer-friendly monospace for data"
    - "Indigo (#6366F1) as primary brand color -- distinguishes from the green/blue/red of competitor observability tools"
    - "4px spacing base unit with 12-step scale -- consistent rhythm without over-constraining layouts"
    - "6px default border radius -- modern without being bubbly; sharp enough for data-dense tables"
    - "Lucide icon set for all UI icons -- consistent 1.5px stroke weight, comprehensive coverage, MIT licensed"
    - "Professional Mode implemented as CSS custom property overrides, not separate component variants -- reduces code duplication"
    - "12-column responsive grid with 5 breakpoints -- sidebar collapses at <1280px, hides at <768px"
    - "All gamification colors (XP gold, level purple, rarity tiers) defined as separate token group -- easily overridden in Professional Mode"
    - "Focus ring uses double box-shadow technique -- visible on any background color without exception"
    - "Canvas (virtual world) renders full-bleed with no page padding -- maximizes immersive viewport area"
    - "Agent detail panel overlays canvas at 400px width rather than navigating away -- maintains spatial context"

  component_count: 43
  design_token_categories: 6
  screen_designs: 9
  accessibility_level: "WCAG 2.2 AA"

