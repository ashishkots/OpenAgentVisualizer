key_decisions:
  - decision: "Stylized Corporate art style (hybrid between low-poly and realistic)"
    rationale: "Pure realism is too expensive and enters uncanny valley. Pure low-poly undermines professional positioning. Stylized corporate balances visual appeal, production cost, and rendering performance."
  - decision: "Lightweight skeletal mesh agents, NOT MetaHumans"
    rationale: "MetaHumans are 50MB+ per character and require facial animation rigs. Agent visualization needs 100+ characters on screen — MetaHumans would consume the entire GPU budget on character rendering alone."
  - decision: "Git LFS over Perforce for initial version control"
    rationale: "Smaller team (< 5 people) does not need Perforce's file locking. Git LFS integrates with GitHub, maintaining consistency with the rest of the Open* Suite's Git workflow."
  - decision: "One Pixel Streaming instance per user (not shared)"
    rationale: "Full interactivity (camera control, agent selection, panel interaction) requires dedicated instance. Shared instances only work for passive spectator mode."
  - decision: "H.264 codec for Pixel Streaming over VP8/VP9"
    rationale: "Broadest browser compatibility including Safari. Hardware NVENC encoding available on all target GPUs."
  - decision: "WebSocket client in C++ (not Blueprint)"
    rationale: "Blueprint WebSocket handling introduces unnecessary overhead for high-frequency event processing. C++ provides direct access to IWebSocket interface with minimal allocation."

risks:
  - risk: "GPU cloud cost for Pixel Streaming may make Enterprise tier uneconomical"
    severity: "high"
    mitigation: "Offer shared spectator mode at lower tier. Optimize instance density per GPU. Consider AMD Instinct GPUs for better price/performance."
  - risk: "UE5 asset production timeline (30 person-weeks) may delay launch"
    severity: "medium"
    mitigation: "Use placeholder assets (mixamo characters, prototype boxes) for functional prototype in 4-5 weeks. Polish assets in parallel."
  - risk: "VR comfort issues may limit VR adoption"
    severity: "low"
    mitigation: "Teleport locomotion default. Comfort vignette. Seated mode option. All comfort features configurable per user."
  - risk: "Maintaining parity between PixiJS web client and UE5 client"
    severity: "medium"
    mitigation: "Both clients consume identical WebSocket/REST APIs. Feature parity is visual only — the data model is shared. Prioritize web client for new features, port to UE5 as secondary."

acceptance_criteria:
  - "UE5 project builds and packages for Windows, macOS, and Linux without errors"
  - "WebSocket client connects to FastAPI backend and processes agent events"
  - "100 agent actors render at 60fps on GTX 1070 at 1080p"
  - "All 12 Niagara particle systems function and respect performance budgets"
  - "Camera modes (free roam, orbital, top-down, cinematic) switch with smooth transitions"
  - "UMG widgets display real-time agent data from backend events"
  - "Gamification elements (XP bars, trophies, celebrations) render correctly in 3D"
  - "Pixel Streaming delivers <100ms end-to-end latency on cloud GPU"
  - "VR mode launches on Quest 3 via Link at 72fps"
  - "Agent state transitions match the XState v5 state machine from the web client"

notes:
  - "This document assumes the FastAPI backend is already operational (as specified in System Architecture Stage 4.1). The UE5 client adds NO backend requirements."
  - "Asset production estimates assume a single artist. With AI-assisted 3D generation tools (Meshy, Point-E, Tripo), mesh production time may reduce by 40-60%."
  - "The UE5 project is a separate Git repository from the main OpenAgentVisualizer web application repository."
